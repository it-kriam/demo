name: 🤖 Claude PR Review

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, synchronize, reopened]

# ── Permissions ────────────────────────────────────────────────────────────────
# Taken from Anthropic's official solutions.md examples
permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:

  # ── Job 1: @claude mention handler ────────────────────────────────────────
  claude-interactive:
    name: 💬 Claude (@claude mention)
    runs-on: ubuntu-latest

    # Only run when @claude is mentioned
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🤖 Claude Code Action
        # ✅ Pinned to last known stable commit — avoids SDK crash bug in @v1
        uses: anthropics/claude-code-action@4a0e9f6ab1a4b13f82f062ef99adae32a5f74e89
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

  # ── Job 2: Auto-review every PR ───────────────────────────────────────────
  claude-auto-review:
    name: 🔍 Claude Auto Review
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'pull_request' &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🤖 Claude Auto Review
        # ✅ Pinned to last known stable commit — avoids SDK crash bug in @v1
        uses: anthropics/claude-code-action@4a0e9f6ab1a4b13f82f062ef99adae32a5f74e89
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are a senior Java software engineer. Review this pull request thoroughly.

            Provide a structured review in this exact format:

            ## 📋 Summary
            [2-3 sentences: what this PR does and overall quality]

            ## 🔴 Critical Issues
            [Bugs, NullPointerExceptions, logic errors, thread-safety, data loss]
            [File name + line number + problem + suggested fix for each]
            [If none: "No critical issues found."]

            ## 🟡 Java Best Practices
            [SOLID violations, missing @Override, raw types, resource leaks,
             improper exception handling, magic numbers, God classes]
            [If none: "No improvements suggested."]

            ## 🔒 Security Concerns
            [SQL injection, hardcoded secrets, insecure deserialization,
             missing input validation, sensitive data in logs]
            [If none: "No security concerns found."]

            ## 🧪 Test Coverage
            [Are JUnit 5 / Mockito tests present? What is missing?
             What edge cases and boundary values should be tested?]

            ## ⚡ Performance
            [N+1 queries, inefficient collections, unnecessary object creation]
            [If none: "No performance concerns."]

            ## 🟢 Positives
            [Clean design, good patterns, proper Java features, well-named methods]

            ## 📊 Score: X/10

            ## ✅ Verdict
            APPROVE | REQUEST_CHANGES | COMMENT — [one sentence reason]
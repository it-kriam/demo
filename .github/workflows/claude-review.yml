name: 🤖 Claude PR Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened]

# Minimum permissions required — from official Anthropic docs
permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:

  # ── Job 1: Respond to @claude mentions ──────────────────────
  claude-interactive:
    name: 💬 Claude (@claude mention)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🤖 Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read
          claude_args: --max-turns 10

  # ── Job 2: Auto-review every PR ─────────────────────────────
  claude-auto-review:
    name: 🔍 Claude Auto Review
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🤖 Claude Auto Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read
          claude_args: --max-turns 5
          prompt: |
            You are a senior Java software engineer. Review this pull request thoroughly.

            ## 📋 Summary
            [2-3 sentences: what this PR does and overall quality]

            ## 🔴 Critical Issues
            [Bugs, NullPointerExceptions, logic errors, thread-safety, data loss]
            [File name + line number + problem + fix. If none: "No critical issues found."]

            ## 🟡 Java Best Practices
            [SOLID violations, resource leaks, raw types, missing @Override, magic numbers]
            [If none: "No improvements suggested."]

            ## 🔒 Security Concerns
            [SQL injection, hardcoded secrets, missing input validation]
            [If none: "No security concerns found."]

            ## 🧪 Test Coverage
            [JUnit 5 / Mockito tests present? What edge cases are missing?]

            ## ⚡ Performance
            [N+1 queries, inefficient loops, blocking calls]
            [If none: "No performance concerns."]

            ## 🟢 Positives
            [Clean design, good patterns, proper Java usage]

            ## 📊 Score: X/10

            ## ✅ Verdict
            APPROVE | REQUEST_CHANGES | COMMENT — [one sentence reason]
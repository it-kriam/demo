name: 🤖 Claude PR Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  id-token: write
  contents: write          # write needed by claude-code-action
  pull-requests: write
  issues: write
  actions: read            # ✅ fixes exit code 1 in most cases

jobs:

  # ── Job 1: @claude mention in PR comments ───────────────────
  claude-interactive:
    name: 💬 Claude (@claude mention)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🤖 Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}   # ✅ explicit token

  # ── Job 2: Auto-review on every PR ──────────────────────────
  claude-auto-review:
    name: 🔍 Claude Auto Review
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🤖 Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}   # ✅ explicit token
          prompt: |
            You are a senior Java software engineer. Review this pull request thoroughly.

            ## 📋 Summary
            [2-3 sentences: what this PR does and overall quality]

            ## 🔴 Critical Issues
            [Bugs, NullPointerExceptions, logic errors, thread-safety, data loss]
            [File + line + problem + fix. If none: "No critical issues found."]

            ## 🟡 Java Best Practices
            [SOLID violations, resource leaks, raw types, magic numbers]
            [If none: "No improvements suggested."]

            ## 🔒 Security Concerns
            [SQL injection, hardcoded secrets, missing input validation]
            [If none: "No security concerns found."]

            ## 🧪 Test Coverage
            [JUnit 5 / Mockito tests present? What edge cases are missing?]

            ## ⚡ Performance
            [N+1 queries, inefficient loops, blocking calls]
            [If none: "No performance concerns."]

            ## 🟢 Positives
            [Clean design, good patterns, proper Java usage]

            ## 📊 Score: X/10

            ## ✅ Verdict
            APPROVE | REQUEST_CHANGES | COMMENT — [one sentence reason]